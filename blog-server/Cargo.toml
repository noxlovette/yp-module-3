[package]
name = "blog-server"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-cors = "0.7.1"
actix-web = "4.14.0"
actix-web-httpauth = "0.8.2"
anyhow = "1.0.103"
argon2 = "0.5.3"
chrono = { version = "0.4.45", features = ["serde"] }
dotenvy = "0.15.7"
jsonwebtoken = "10.4.0"
prost = "0.14.4"
prost-types = "0.14.4"
serde = "1.0.228"
thiserror = "2.0.18"
tonic = "0.14.6"
tonic-build = "0.14.6"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
validator = { version = "0.20.0", features = ["derive"] }
sqlx = { version = "0.9", features = [
    "runtime-tokio",
    "tls-rustls-ring-native-roots",
    "postgres",
    "macros",
    "chrono",
] }
